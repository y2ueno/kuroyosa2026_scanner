<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>よさこい2026 スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; touch-action: manipulation; }
    #wrapper { 
      position: relative; width: 100%; max-width: 340px; margin: 0 auto; 
      aspect-ratio: 1 / 1; border-radius: 20px; overflow: hidden; 
      background: #000; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    #video { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      object-fit: cover; /* 歪み（圧縮）を防止 */
    }
    #msg { 
      margin-top: 15px; padding: 12px; border-radius: 12px; font-weight: bold; 
      background: #fff; min-height: 50px; border: 2px solid #ccc; font-size: 1rem;
      white-space: pre-line; word-break: break-all;
    }
    .status-success { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
    .status-error   { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-info    { color: #174ea6; background: #e8f0fe !important; border-color: #4285f4 !important; }
    .guide-box { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 70%; height: 70%; border: 2px solid rgba(255,255,255,0.4); border-radius: 12px;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="guide-box"></div>
  </div>
  <div id="msg">カメラ起動中...</div>

  <script>
    const SUPABASE_URL = "https://ucrwpjmmmxfdkmzewtcp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_a3q5s8toPwGWzu5EnX7VqA_ZQMeUm_e";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const video = document.getElementById('video');
    const msg = document.getElementById('msg');
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('stamp_user_id') || params.get('uid');

    let isScanning = false;

    async function startCamera() {
      if (!userId) {
        msg.innerText = "エラー: ユーザーIDが不明です。\nアプリから開き直してください。";
        msg.className = "status-error";
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          isScanning = true;
          msg.innerText = "QRコードを読み取ってください";
          requestAnimationFrame(tick);
        };
      } catch (err) {
        msg.innerText = "カメラ起動失敗: " + err.message;
        msg.className = "status-error";
      }
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code && code.data) {
          isScanning = false;
          handleDiscovery(code.data);
          return;
        }
      }
      if (isScanning) requestAnimationFrame(tick);
    }

    async function handleDiscovery(spotId) {
      msg.innerText = "データ照会中...";
      msg.className = "status-info";

      try {
        // 重複チェック (id列ではなくuser_id列を参照するように修正)
        const { data: existing, error: checkError } = await supabaseClient
          .from('stamps')
          .select('user_id') 
          .eq('user_id', userId)
          .eq('spot_id', spotId)
          .maybeSingle();

        if (checkError) throw new Error("照会失敗: " + checkError.message);

        if (existing) {
          msg.innerText = "取得済みです\n(" + spotId + ")";
          msg.className = "status-error";
          setTimeout(() => { isScanning = true; requestAnimationFrame(tick); }, 3000);
          return;
        }

        // 登録実行
        const { error: insertError } = await supabaseClient
          .from('stamps')
          .insert([{ 
            user_id: userId, 
            spot_id: spotId,
            timestamp: new Date().toISOString()
          }]);

        if (insertError) throw new Error("登録失敗: " + insertError.message);

        msg.innerText = "スタンプ取得成功！\n" + spotId;
        msg.className = "status-success";
        if (navigator.vibrate) navigator.vibrate(200);

      } catch (err) {
        msg.innerText = "【エラー】\n" + err.message;
        msg.className = "status-error";
        setTimeout(() => { isScanning = true; requestAnimationFrame(tick); }, 4000);
      }
    }

    startCamera();
  </script>
</body>
</html>
