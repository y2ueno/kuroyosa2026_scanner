<!DOCTYPE html>
<!-- デバッグ版で正常動作確認済み → 本番版 -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* 省略（前回の最終版と同じ） */
    body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; }
    #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #fff; }
    #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; }
    #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; min-height: 60px; border: 2px solid #ccc; line-height: 1.5; white-space: pre-line; }
    .status-success  { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
    .status-complete { color: #b5600f; background: #fff3e0 !important; border-color: #ff9800 !important; }
    .status-already  { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-error    { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-info     { color: #174ea6; background: #e8f0fe !important; border-color: #4285f4 !important; }
  </style>
</head>
<body>
  <div id="wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="msg">カメラ起動中...</div>

    // uid / stamp_user_id 両対応
    // ログなしのクリーン版

</body>
</html>
