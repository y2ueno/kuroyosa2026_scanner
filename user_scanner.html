<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #fff5e6;
      margin: 0;
      padding: 20px;
    }

    #wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      border: 4px solid #fff;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    #msg, #debug {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: #fff;
      min-height: 60px;
      border: 2px solid #ccc;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      text-align: left;
    }

    #msg {
      font-weight: bold;
      text-align: center;
      white-space: pre-line;
    }

    .status-success  { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
    .status-complete { color: #b5600f; background: #fff3e0 !important; border-color: #ff9800 !important; }
    .status-already  { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-error    { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-info     { color: #174ea6; background: #e8f0fe !important; border-color: #4285f4 !important; }

    .debug-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="msg">初期化中...</div>

  <div id="debug">
    <div class="debug-title">Debug</div>
    読み込み中...
  </div>

  <script>
    const SUPABASE_URL = "https://ucrwpjmmmxfdkmzewtcp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_a3q5s8toPwGWzu5EnX7VqA_ZQMeUm_e";
    const SPOTS_API_URL =
      "https://script.google.com/macros/s/AKfycbwxzKwjgXaEoKs58M-TNvUAxBUpy9F6462ftPizV-L0KDt5WkFJLXHeWhH4DFwY2DvH/exec?mode=spots";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const msg = document.getElementById("msg");
    const debug = document.getElementById("debug");

    const queryParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));

    const stampUserId =
      queryParams.get("stamp_user_id") ||
      queryParams.get("uid") ||
      hashParams.get("stamp_user_id") ||
      hashParams.get("uid") ||
      "";

    let isScanning = true;
    let validSpotIds = new Set();
    let debugLines = [];

    function setMessage(text, className = "") {
      msg.innerText = text;
      msg.className = className;
    }

    function addDebug(label, value = "") {
      const line = value === "" ? `[${new Date().toLocaleTimeString()}] ${label}` : `[${new Date().toLocaleTimeString()}] ${label}: ${value}`;
      debugLines.push(line);
      debug.innerText = debugLines.join("\n");
    }

    function addSeparator(title = "") {
      debugLines.push("");
      if (title) debugLines.push(`----- ${title} -----`);
      debug.innerText = debugLines.join("\n");
    }

    function resetScanner(delay = 3000) {
      addDebug("resetScanner", `${delay}ms後に再開`);
      setTimeout(() => {
        isScanning = true;
        setMessage("QRをスキャンしてください");
        addDebug("scanner", "再開");
        requestAnimationFrame(tick);
      }, delay);
    }

    function backToPrevious(delay = 2000) {
      addDebug("backToPrevious", `${delay}ms後に戻る`);
      setTimeout(() => {
        if (window.history.length > 1) {
          addDebug("history.length", String(window.history.length));
          addDebug("history.back", "実行");
          window.history.back();
        } else {
          addDebug("history.length", String(window.history.length));
          addDebug("history.back", "不可");
          setMessage("取得完了。前の画面に戻ってください", "status-success");
        }
      }, delay);
    }

    async function fetchTextSafe(res) {
      const text = await res.text();
      return text || `${res.status} ${res.statusText}`;
    }

    async function loadValidSpots() {
      addSeparator("loadValidSpots");
      addDebug("request", SPOTS_API_URL);

      const res = await fetch(SPOTS_API_URL);
      addDebug("spots status", `${res.status} ${res.statusText}`);

      if (!res.ok) {
        throw new Error("スポット一覧取得失敗: " + await fetchTextSafe(res));
      }

      const json = await res.json();
      addDebug("spots ok", String(json.ok));
      addDebug("spots count(raw)", Array.isArray(json.spots) ? String(json.spots.length) : "not array");

      if (!json.ok) {
        throw new Error(json.error || "スポット一覧取得エラー");
      }

      if (!Array.isArray(json.spots)) {
        throw new Error("スポット一覧の形式が不正です");
      }

      validSpotIds = new Set(
        json.spots.map(v => String(v || "").trim()).filter(Boolean)
      );

      addDebug("spots count(valid)", String(validSpotIds.size));
      addDebug("spots sample", Array.from(validSpotIds).slice(0, 10).join(", "));
    }

    async function startCamera() {
      addSeparator("startCamera");
      addDebug("mediaDevices", !!navigator.mediaDevices ? "available" : "missing");
      addDebug("getUserMedia", navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? "available" : "missing");

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        addDebug("camera", "stream acquired");
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          addDebug("videoWidth", String(video.videoWidth));
          addDebug("videoHeight", String(video.videoHeight));
          video.play();
          setMessage("QRをスキャンしてください");
          addDebug("scanner", "tick開始");
          requestAnimationFrame(tick);
        };
      } catch (err) {
        addDebug("camera error", err.message);
        setMessage("カメラエラー: " + err.message, "status-error");
      }
    }

    function tick() {
      if (!isScanning) return;

      if (video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code && code.data) {
          isScanning = false;
          addSeparator("QR detected");
          addDebug("QR raw", code.data);
          handleScan(code.data.trim());
          return;
        }
      }

      requestAnimationFrame(tick);
    }

    async function handleScan(scannedValue) {
      addSeparator("handleScan");
      addDebug("scannedValue", scannedValue);
      addDebug("resolved stampUserId", stampUserId);

      setMessage("照合中...", "status-info");

      if (!stampUserId) {
        addDebug("stampUserId", "missing");
        setMessage("stamp_user_id が渡されていません", "status-error");
        resetScanner();
        return;
      }

      const spotId = scannedValue;
      addDebug("spotId", spotId);

      try {
        if (!validSpotIds.has(spotId)) {
          addDebug("spot validation", "NG");
          setMessage("正しくないQRコードです", "status-error");
          resetScanner();
          return;
        }

        addDebug("spot validation", "OK");

        const checkUrl =
          `${SUPABASE_URL}/rest/v1/stamps?select=spot_id&user_id=eq.${encodeURIComponent(stampUserId)}&spot_id=eq.${encodeURIComponent(spotId)}`;

        addSeparator("duplicate check");
        addDebug("GET", checkUrl);

        const checkRes = await fetch(checkUrl, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
          }
        });

        addDebug("duplicate status", `${checkRes.status} ${checkRes.statusText}`);

        if (!checkRes.ok) {
          throw new Error("重複チェック失敗: " + await fetchTextSafe(checkRes));
        }

        const existing = await checkRes.json();
        addDebug("duplicate count", Array.isArray(existing) ? String(existing.length) : "not array");

        if (Array.isArray(existing) && existing.length > 0) {
          setMessage("このスポットは取得済みです", "status-already");
          addDebug("result", "already exists");
          resetScanner();
          return;
        }

        const nowIso = new Date().toISOString();
        const insertBody = {
          user_id: stampUserId,
          spot_id: spotId,
          timestamp: nowIso,
          exchanged: false,
          complete_entry: false
        };

        addSeparator("insert stamp");
        addDebug("POST", `${SUPABASE_URL}/rest/v1/stamps`);
        addDebug("body", JSON.stringify(insertBody));

        const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/stamps`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(insertBody)
        });

        addDebug("insert status", `${insertRes.status} ${insertRes.statusText}`);

        if (!insertRes.ok) {
          throw new Error("登録失敗: " + await fetchTextSafe(insertRes));
        }

        const allUrl =
          `${SUPABASE_URL}/rest/v1/stamps?select=spot_id&user_id=eq.${encodeURIComponent(stampUserId)}`;

        addSeparator("count unique spots");
        addDebug("GET", allUrl);

        const allRes = await fetch(allUrl, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
          }
        });

        addDebug("count status", `${allRes.status} ${allRes.statusText}`);

        if (!allRes.ok) {
          throw new Error("スタンプ数確認失敗: " + await fetchTextSafe(allRes));
        }

        const allStamps = await allRes.json();
        addDebug("all rows", Array.isArray(allStamps) ? String(allStamps.length) : "not array");

        const uniqueCount = new Set(
          (allStamps || []).map(s => String(s.spot_id || "").trim()).filter(Boolean)
        ).size;

        addDebug("uniqueCount", String(uniqueCount));

        if (uniqueCount >= 4) {
          const patchUrl =
            `${SUPABASE_URL}/rest/v1/stamps?user_id=eq.${encodeURIComponent(stampUserId)}&complete_entry=eq.false`;

          addSeparator("complete update");
          addDebug("PATCH", patchUrl);

          const patchRes = await fetch(patchUrl, {
            method: "PATCH",
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
            },
            body: JSON.stringify({
              complete_entry: true,
              complete_entry_at: nowIso
            })
          });

          addDebug("patch status", `${patchRes.status} ${patchRes.statusText}`);

          if (!patchRes.ok) {
            throw new Error("コンプリート更新失敗: " + await fetchTextSafe(patchRes));
          }

          setMessage("コンプリート！\n抽選にエントリーされました！", "status-complete");
          addDebug("result", "complete");
          backToPrevious(2000);
          return;
        }

        setMessage(`スタンプ取得！（${uniqueCount}/4）`, "status-success");
        addDebug("result", `success ${uniqueCount}/4`);
        backToPrevious(2000);

      } catch (e) {
        addDebug("exception", e.message);
        setMessage("通信エラー: " + e.message, "status-error");
        resetScanner();
      }
    }

    (async function init() {
      try {
        addSeparator("init");
        addDebug("href", window.location.href);
        addDebug("search", window.location.search || "(empty)");
        addDebug("hash", window.location.hash || "(empty)");
        addDebug("query stamp_user_id", queryParams.get("stamp_user_id"));
        addDebug("query uid", queryParams.get("uid"));
        addDebug("hash stamp_user_id", hashParams.get("stamp_user_id"));
        addDebug("hash uid", hashParams.get("uid"));
        addDebug("resolved stampUserId", stampUserId || "(empty)");

        if (!stampUserId) {
          setMessage("stamp_user_id が渡されていません", "status-error");
          addDebug("init stop", "stampUserId missing");
          return;
        }

        setMessage("準備中...", "status-info");
        await loadValidSpots();
        await startCamera();
      } catch (e) {
        addDebug("init exception", e.message);
        setMessage("初期化エラー: " + e.message, "status-error");
      }
    })();
  </script>
</body>
</html>
