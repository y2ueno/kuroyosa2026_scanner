<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よさこい2026 スタンプスキャナー</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #info {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .user-info {
            color: #1a73e8;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        #result {
            margin-top: 10px;
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>スタンプスキャナー</h2>

    <div id="info">
        <div id="participant-display" class="user-info">参加者確認中...</div>
        <div id="result">QRコードをスキャンしてください</div>
    </div>

    <div id="reader"></div>

    <script>
        // --- 設定エリア ---
        const WEBHOOK_URL = 'https://hook.us2.make.com/m0vinx83pe2fmwwnt4g3r83fiak6r117'; // ★MakeのURLに差し替えてください

        // 1. URLパラメータから 13日の設計どおりの名前で取得
        const params = new URLSearchParams(window.location.search);
        const STAMP_USER_ID = params.get('stamp_user_id') || ''; 
        const USER_EMAIL = params.get('email') || '';

        // 画面上部への表示
        const infoDisplay = document.getElementById('participant-display');
        if (USER_EMAIL) {
            infoDisplay.innerText = `参加者: ${USER_EMAIL} (${STAMP_USER_ID})`;
        } else {
            infoDisplay.innerHTML = `<span style="color:red;">参加者情報がありません</span>`;
        }

        // 2. スキャナーの設定
        const html5QrCode = new html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        const onScanSuccess = (decodedText) => {
            // 重複送信防止のため一旦停止
            html5QrCode.stop();
            
            const resultDisplay = document.getElementById('result');
            resultDisplay.innerText = "送信中...";
            resultDisplay.className = "";

            // 3. Makeに送るURLを作成（すべて stamp_user_id に統一）
            const userId = decodedText; // QRコードの中身
            const finalUrl = `${WEBHOOK_URL}?userId=${encodeURIComponent(userId)}&stamp_user_id=${encodeURIComponent(STAMP_USER_ID)}&userEmail=${encodeURIComponent(USER_EMAIL)}`;

            // 4. Webhook送信
            fetch(finalUrl)
                .then(response => {
                    if (response.ok) {
                        resultDisplay.innerText = "スキャン成功！保存されました。";
                        resultDisplay.className = "success";
                    } else {
                        resultDisplay.innerText = "保存に失敗しました。";
                        resultDisplay.className = "error";
                    }
                })
                .catch(err => {
                    resultDisplay.innerText = "通信エラーが発生しました。";
                    resultDisplay.className = "error";
                })
                .finally(() => {
                    // 3秒後に再起動
                    setTimeout(() => {
                        resultDisplay.innerText = "QRコードをスキャンしてください";
                        resultDisplay.className = "";
                        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                    }, 3000);
                });
        };

        // スキャナー開始
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                document.getElementById('result').innerText = "カメラの起動に失敗しました。";
            });
    </script>
</body>
</html>
