<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カメラ復活テスト</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f2f5; text-align: center; }
        .ver-header { background: #333; color: white; padding: 5px; font-size: 10px; }
        #reader { width: 95%; max-width: 500px; margin: 10px auto; background: white; border: 1px solid #ccc; min-height: 250px; }
        #result { margin: 15px; font-weight: bold; padding: 12px; border-radius: 4px; }
        .success { color: #155724; background: #d4edda; }
        .error { color: #721c24; background: #f8d7da; }
        .retry-btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="ver-header">Ver: 23:10 (Camera Recovery Mode)</div>
    
    <div id="status-msg" style="color: red; padding: 10px; font-size: 14px;"></div>
    <button id="retry-load" class="retry-btn" style="display:none;" onclick="location.reload()">再読み込み</button>

    <div id="reader"></div>
    <div id="result"></div>

    <script>
        const WEBHOOK_URL = 'https://hook.us2.make.com/m0vinx83pe2fmwwnt4g3r83fiak6r117';
        const params = new URLSearchParams(window.location.search);
        const STAMP_USER_ID = params.get('stamp_user_id') || 'ID不明';
        const EMAIL = params.get('email') || 'メール不明';

        function onScanSuccess(decodedText) {
            const resultDisplay = document.getElementById('result');
            resultDisplay.innerText = "通信中...";
            const finalUrl = `${WEBHOOK_URL}?spotId=${encodeURIComponent(decodedText)}&stamp_user_id=${encodeURIComponent(STAMP_USER_ID)}&email=${encodeURIComponent(EMAIL)}`;
            
            fetch(finalUrl).then(res => {
                if (res.ok) {
                    resultDisplay.innerText = "【成功】スタンプを記録しました！";
                    resultDisplay.className = "success";
                }
            }).catch(e => {
                resultDisplay.innerText = "通信失敗";
                resultDisplay.className = "error";
            });
        }

        function initScanner() {
            const statusMsg = document.getElementById('status-msg');
            
            // ライブラリが存在するか最終チェック
            if (typeof Html5QrcodeScanner === "undefined") {
                statusMsg.innerText = "部品の読み込みに失敗しました。下のボタンを押してください。";
                document.getElementById('retry-load').style.display = "inline-block";
                return;
            }

            statusMsg.innerText = "カメラを起動しています...";
            statusMsg.style.color = "blue";

            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: 250,
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            });
            
            html5QrcodeScanner.render(onScanSuccess, (err) => {
                // スキャン中の微細なエラーは表示しない
            });

            // 起動に成功したらメッセージを消す
            setTimeout(() => { statusMsg.innerText = ""; }, 3000);
        }

        // ページが読み込まれてから1.5秒後に起動（Glideの動作安定待ち）
        window.onload = () => {
            setTimeout(initScanner, 1500);
        };
    </script>
</body>
</html>
