<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #fff; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; min-height: 60px; border: 2px solid #ccc; }
        .status-success  { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
        .status-complete { color: #b5600f; background: #fff3e0 !important; border-color: #ff9800 !important; }
        .status-already  { color: #d93025; background: #fce8e6 !important; }
        .status-error    { color: #d93025; }
    </style>
</head>
<body>
    <div id="wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="msg">カメラ起動中...</div>

    <script>
        const SUPABASE_URL = "https://ucrwpjmmmxfdkmzewtcp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjcndwam1tbXhmZGttemV3dGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzc1MTAsImV4cCI6MjA5MzkxMzUxMH0.nNfB1yuudSp-p0yZS15_ZuZOdTco6rRHxZmGV5vT9TA";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const msg = document.getElementById("msg");
        const myUserId = new URLSearchParams(window.location.search).get("uid") || "";
        let isScanning = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                msg.innerText = "QRをスキャンしてください";
                requestAnimationFrame(tick);
            };
        })
        .catch(err => {
            msg.innerText = "カメラエラー: " + err.message;
            msg.className = "status-error";
        });

        function tick() {
            if (video.readyState >= 2 && isScanning) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) {
                    isScanning = false;
                    sendData(code.data);
                }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        async function sendData(spotId) {
            msg.innerText = "照合中...";

            try {
                // 重複チェック
                const checkRes = await fetch(
                    `${SUPABASE_URL}/rest/v1/stamps?user_id=eq.${encodeURIComponent(myUserId)}&spot_id=eq.${encodeURIComponent(spotId)}`,
                    { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
                );
                const existing = await checkRes.json();

                if (existing.length > 0) {
                    msg.innerHTML = "このスポットは取得済みです";
                    msg.className = "status-already";
                    setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
                    return;
                }

                // 新規登録
                const insertRes = await fetch(
                    `${SUPABASE_URL}/rest/v1/stamps`,
                    {
                        method: "POST",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": "Bearer " + SUPABASE_KEY,
                            "Content-Type": "application/json",
                            "Prefer": "return=minimal"
                        },
                        body: JSON.stringify({
                            user_id: myUserId,
                            spot_id: spotId,
                            timestamp: new Date().toLocaleString("ja-JP")
                        })
                    }
                );

                if (!insertRes.ok) {
                    const err = await insertRes.text();
                    msg.innerText = "エラー: " + err;
                    msg.className = "status-error";
                    setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
                    return;
                }

                // スタンプ数確認
                const allRes = await fetch(
                    `${SUPABASE_URL}/rest/v1/stamps?user_id=eq.${encodeURIComponent(myUserId)}&select=spot_id`,
                    { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
                );
                const allStamps = await allRes.json();
                const uniqueCount = new Set(allStamps.map(s => s.spot_id)).size;

                if (uniqueCount >= 4) {
                    // コンプリート賞エントリー
                    await fetch(
                        `${SUPABASE_URL}/rest/v1/stamps?user_id=eq.${encodeURIComponent(myUserId)}`,
                        {
                            method: "PATCH",
                            headers: {
                                "apikey": SUPABASE_KEY,
                                "Authorization": "Bearer " + SUPABASE_KEY,
                                "Content-Type": "application/json",
                                "Prefer": "return=minimal"
                            },
                            body: JSON.stringify({
                                complete_entry: true,
                                complete_entry_at: new Date().toISOString()
                            })
                        }
                    );
                    msg.innerHTML = "🎉 コンプリート！<br>抽選にエントリーされました！";
                    msg.className = "status-complete";
                } else {
                    msg.innerHTML = `✅ スタンプ取得！（${uniqueCount}/4）`;
                    msg.className = "status-success";
                }

            } catch (e) {
                msg.innerText = "通信エラー: " + e.message;
                msg.className = "status-error";
                setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
            }
        }
    </script>
</body>
</html>
