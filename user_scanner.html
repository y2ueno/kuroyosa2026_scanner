<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よさこい2026｜スタンプ取得</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff5e6; margin: 0; padding: 20px; color: #333; }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #e67e22; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 20px; background: #000; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #canvas { width: 100%; height: 100%; object-fit: cover; }
        #msg { margin-top: 25px; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .status-wait { color: #5f6368; }
        .status-error { color: #d93025; background: #fce8e6 !important; }
        .status-sending { color: #e67e22; animation: blink 1s infinite; }
        .status-success { color: #188038; background: #e6f4ea !important; border: 2px solid #34a853; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>スポットQRを読み取る</h1>

    <div id="wrapper">
        <video id="video" style="display:none"></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="msg" class="status-wait">カメラの起動を準備中...</div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");

        const GAS_URL = "https://script.google.com/macros/s/AKfycbx0fAcXHpHTFkGkBflIKY7m6DOqFhkJjX2oZc5zzwsECZ7NM8EuTo3cwSiq5OcRRSK6Vg/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const myUserId = urlParams.get('uid');

        let isScanning = true;

        if (!myUserId) {
            msg.innerText = "【エラー】ユーザー情報が不足しています。アプリから開き直してください。";
            msg.className = "status-error";
            isScanning = false;
        }

        /**
         * 1. カメラの起動と権限リクエスト
         */
        function startCamera() {
            if (!isScanning) return;

            const constraints = {
                video: { facingMode: "environment" }
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true); // iOS Safariでの全画面再生防止
                    video.play();
                    
                    msg.innerText = "QRコードを枠内に収めてください";
                    msg.className = "status-wait";
                    
                    requestAnimationFrame(tick);
                })
                .catch(err => {
                    console.error("Camera Error:", err);
                    // 権限拒否やカメラ不在時のメッセージ
                    msg.innerHTML = "【エラー】カメラを起動できませんでした。<br>設定でカメラの使用を「許可」して、再読み込みしてください。";
                    msg.className = "status-error";
                });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    isScanning = false;
                    sendData(code.data);
                }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        function sendData(spotId) {
            msg.innerText = "通信中...";
            msg.className = "status-sending";

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ userId: myUserId, spotId: spotId })
            })
            .then(() => {
                msg.innerHTML = "スタンプを取得しました！<br><span style='font-size:12px'>画面右上の「完了」で戻ってください</span>";
                msg.className = "status-success";
                if (navigator.vibrate) navigator.vibrate(200);
            })
            .catch(err => {
                alert("エラー: " + err);
                isScanning = true;
                msg.innerText = "再スキャンしてください";
            });
        }

        // 実行開始
        startCamera();
    </script>
</body>
</html>
