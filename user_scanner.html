<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参加者スキャナー</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f2f5; text-align: center; }
        .info-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; min-height: 300px; }
        #result { margin-top: 15px; font-weight: bold; padding: 10px; }
        .success { color: #155724; background: #d4edda; }
        .error { color: #721c24; background: #f8d7da; }
    </style>
</head>
<body>

    <div class="info-box">
        <div id="user-display" style="font-weight:bold; color:#1a73e8;">参加者確認中...</div>
        <div style="font-size: 0.8em; color: #666;">スタンプ設置場所のQRを読んでください</div>
    </div>

    <div id="reader"></div>
    <div id="result"></div>

    <script>
        // ★★★ここが「ユーザー用」のWebhook URLになっているか確認！★★★
        const WEBHOOK_URL = 'https://hook.us2.make.com/xxxxxxxxxxxxxxxx'; 

        const params = new URLSearchParams(window.location.search);
        const STAMP_USER_ID = params.get('stamp_user_id') || '';
        const EMAIL = params.get('email') || '';

        document.getElementById('user-display').innerText = `参加者: ${EMAIL} (${STAMP_USER_ID})`;

        function onScanSuccess(decodedText) {
            scanner.clear();
            const resultDisplay = document.getElementById('result');
            resultDisplay.innerText = "送信中...";

            // パラメータ名を「stamp_user_id」に統一して送信
            const finalUrl = `${WEBHOOK_URL}?spotId=${encodeURIComponent(decodedText)}&stamp_user_id=${encodeURIComponent(STAMP_USER_ID)}&email=${encodeURIComponent(EMAIL)}`;

            fetch(finalUrl)
                .then(async response => {
                    if (response.ok) {
                        resultDisplay.innerText = "成功：スタンプをゲットしました！";
                        resultDisplay.className = "success";
                        setTimeout(() => location.reload(), 3000);
                    } else {
                        const errorMsg = await response.text();
                        resultDisplay.innerText = "エラー: " + errorMsg;
                        resultDisplay.className = "error";
                    }
                })
                .catch(err => {
                    resultDisplay.innerText = "通信エラーが発生しました";
                    resultDisplay.className = "error";
                });
        }

        let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
