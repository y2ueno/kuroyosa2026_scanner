<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; }
        #wrapper { width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #fff; }
        #canvas { width: 100%; height: 100%; object-fit: cover; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; min-height: 60px; }
        .status-sending { color: #e67e22; }
        .status-success { color: #188038; background: #e6f4ea !important; border: 2px solid #34a853; }
        .status-already { color: #d93025; background: #fce8e6 !important; border: 2px solid #d93025; }
        .status-error { color: #d93025; background: #fce8e6 !important; font-size: 12px; border: 1px solid #d93025; }
    </style>
</head>
<body>
    <div id="wrapper"><video id="video" style="display:none"></video><canvas id="canvas"></canvas></div>
    <div id="msg">QRをスキャンしてください</div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");
        
        // Glideから渡されるユーザーIDを取得
        const myUserId = new URLSearchParams(window.location.search).get('uid');
        let isScanning = true;

        // カメラ起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream; video.setAttribute("playsinline", true); video.play();
            requestAnimationFrame(tick);
        });

        // 毎フレームのスキャン処理
        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.height = video.videoHeight; canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) { 
                    isScanning = false; 
                    sendData(code.data); 
                }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        /**
         * データの送信（Vercelプロキシ経由）
         * サーバーサイドでGASを叩くため、CORSエラーやリダイレクト問題を回避できます。
         */
        async function sendData(spotId) {
            msg.innerText = "サーバー照合中..."; msg.className = "status-sending";
            
            // Vercel内のAPIエンドポイントを叩く
            const proxyUrl = `/api/stamp?uid=${encodeURIComponent(myUserId || "")}&sid=${encodeURIComponent(spotId)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                handleResult(data.result);
            } catch (e) {
                console.error("Proxy通信エラー:", e);
                msg.innerText = "エラー: サーバーとの接続に失敗しました";
                msg.className = "status-error";
                // 3秒後に再スキャンを可能にする
                setTimeout(() => { isScanning = true; }, 3000);
            }
        }

        // 結果の表示処理
        function handleResult(res) {
            if (res === "success") {
                msg.innerHTML = "スタンプを取得！"; msg.className = "status-success";
            } else if (res === "already") {
                msg.innerHTML = "取得済みです"; msg.className = "status-already";
            } else if (res === "error_id") {
                msg.innerText = "エラー: IDが正しく設定されていません"; msg.className = "status-error";
                setTimeout(() => { isScanning = true; }, 3000);
            } else {
                msg.innerText = "エラー: " + res; msg.className = "status-error";
                setTimeout(() => { isScanning = true; }, 3000);
            }
        }
    </script>
</body>
</html>
