<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #fff; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; min-height: 60px; border: 2px solid #ccc; }
        .status-success { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
        .status-already { color: #d93025; background: #fce8e6 !important; }
        .status-error   { color: #d93025; }
    </style>
</head>
<body>
    <div id="wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div id="msg">カメラ起動中...</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx91GCilncyaaaHV0ehga2csz2c8z8auvzUl4lRjddV3sQOKrdu8OWLqiv_0V2eWujs_g/exec";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");
        const myUserId = new URLSearchParams(window.location.search).get("uid") || "";
        let isScanning = true;

        // ★変更なし：カメラ起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                msg.innerText = "QRをスキャンしてください";
                requestAnimationFrame(tick);
            };
        })
        .catch(err => {
            msg.innerText = "カメラエラー: " + err.message;
            msg.className = "status-error";
        });

        // ★変更なし：QR読み取りループ
        function tick() {
            if (video.readyState >= 2 && isScanning) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height);
                if (code) {
                    isScanning = false;
                    sendData(code.data);
                }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        // ★★★ ここから全部変更：scriptタグ → iframeのpostMessage方式 ★★★
        function sendData(spotId) {
            msg.innerText = "照合中...";

            // 古いiframeがあれば削除
            const old = document.getElementById("gas_iframe");
            if (old) old.remove();

            // postMessageでGASの結果を受け取るリスナー
            const timer = setTimeout(() => {
                window.removeEventListener("message", onMessage);
                msg.innerText = "タイムアウト。再試行してください";
                msg.className = "status-error";
                setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
            }, 10000);

            function onMessage(e) {
                if (!e.data || !e.data.gasResult) return;
                clearTimeout(timer);
                window.removeEventListener("message", onMessage);
                const result = e.data.gasResult;
                if (result === "success") {
                    msg.innerHTML = "✅ スタンプを取得！";
                    msg.className = "status-success";
                } else if (result === "already") {
                    msg.innerHTML = "取得済みです";
                    msg.className = "status-already";
                    setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
                } else {
                    msg.innerText = "エラー: " + result;
                    msg.className = "status-error";
                    setTimeout(() => { isScanning = true; msg.innerText = "QRをスキャンしてください"; msg.className = ""; }, 3000);
                }
            }

            window.addEventListener("message", onMessage);

            // iframeでGASを呼び出す
            const iframe = document.createElement("iframe");
            iframe.id = "gas_iframe";
            iframe.style.display = "none";
            iframe.src = GAS_URL
                + "?uid=" + encodeURIComponent(myUserId)
                + "&sid=" + encodeURIComponent(spotId)
                + "&callback=onResult";
            document.body.appendChild(iframe);
        }
        // ★★★ 変更ここまで ★★★
    </script>
</body>
</html>
