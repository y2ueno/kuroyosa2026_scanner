<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よさこい2026｜スタンプ取得</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* デザインは事務局用をベースに、色味をスタンプラリー向けに変更 */
        body { text-align: center; font-family: sans-serif; background: #fff5e6; margin: 0; padding: 20px; color: #333; }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #e67e22; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 20px; background: #000; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #canvas { width: 100%; height: 100%; object-fit: cover; }
        #msg { margin-top: 25px; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .status-wait { color: #5f6368; }
        .status-error { color: #d93025; background: #fce8e6 !important; }
        .status-sending { color: #e67e22; animation: blink 1s infinite; }
        .status-success { color: #188038; background: #e6f4ea !important; border: 2px solid #34a853; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hint { font-size: 12px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>スポットQRを読み取る</h1>

    <div id="wrapper">
        <video id="video" style="display:none"></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="msg" class="status-wait">カメラを起動中...</div>
    <p class="hint">スタンプ設置場所のQRコードをスキャンしてください</p>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");

        // 1. 先ほどデプロイした「ユーザー用判定GAS」のURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyGKfQ2MzV2q1xNb9BSmmTw8LQjB67foOXKt7gEYWjudALCpG5wAFDbFbyfKz0fjhsF7A/exec";

        // 2. Glideから渡されたURLパラメータ（?uid=...）からユーザーIDを取得
        const urlParams = new URLSearchParams(window.location.search);
        const myUserId = urlParams.get('uid');

        let isScanning = true;

        // ユーザーIDがない場合の警告
        if (!myUserId) {
            msg.innerText = "【エラー】ユーザー情報が正しく渡されていません。アプリから開き直してください。";
            msg.className = "status-error";
            isScanning = false;
        }

        function startCamera() {
            if (!isScanning) return;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                msg.innerText = "スポットのQRを枠内に収めてください";
                requestAnimationFrame(tick);
            })
            .catch(err => {
                msg.innerText = "カメラを起動できません";
                msg.className = "status-error";
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    isScanning = false;
                    sendData(code.data); // QRから読み取った値（スポットID）を送信
                }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        function sendData(spotId) {
            msg.innerText = "スタンプ通信中...";
            msg.className = "status-sending";

            // GASへ「自分のID」と「スポットID」を送信
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GASのCORS制約回避のため
                body: JSON.stringify({ 
                    userId: myUserId, 
                    spotId: spotId 
                })
            })
            .then(() => {
                msg.innerHTML = "スタンプを取得しました！<br><span style='font-size:12px'>（反映まで数秒かかる場合があります）</span>";
                msg.className = "status-success";
                if (navigator.vibrate) navigator.vibrate(200);
                
                // 3秒後に自動的にGlideアプリへ戻る（任意設定）
                // setTimeout(() => { window.location.href = "https://go.glideapps.com/play/AHG0yCa8lmo61Eb3FUSs"; }, 3000);
            })
            .catch(err => {
                alert("送信エラー: " + err);
                isScanning = true;
                msg.innerText = "エラー：再試キャンしてください";
            });
        }

        startCamera();
    </script>
</body>
</html>
