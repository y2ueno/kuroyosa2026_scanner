<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #fff5e6;
      margin: 0;
      padding: 20px;
    }

    #wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      border: 4px solid #fff;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    #msg, #debug {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: #fff;
      min-height: 60px;
      border: 2px solid #ccc;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      text-align: left;
    }

    #msg {
      font-weight: bold;
      text-align: center;
    }

    .status-success  { color: #188038; background: #e6f4ea !important; border-color: #34a853 !important; }
    .status-complete { color: #b5600f; background: #fff3e0 !important; border-color: #ff9800 !important; }
    .status-already  { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-error    { color: #d93025; background: #fce8e6 !important; border-color: #d93025 !important; }
    .status-info     { color: #174ea6; background: #e8f0fe !important; border-color: #4285f4 !important; }

    .debug-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="msg">初期化中...</div>

  <div id="debug">
    <div class="debug-title">Debug</div>
    読み込み中...
  </div>

  <script>
    const SUPABASE_URL = "https://ucrwpjmmmxfdkmzewtcp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_a3q5s8toPwGWzu5EnX7VqA_ZQMeUm_e";
    const SPOTS_API_URL =
      "https://script.google.com/macros/s/AKfycbwxzKwjgXaEoKs58M-TNvUAxBUpy9F6462ftPizV-L0KDt5WkFJLXHeWhH4DFwY2DvH/exec?mode=spots";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const msg = document.getElementById("msg");
    const debug = document.getElementById("debug");

    const queryParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
    const stampUserId =
      queryParams.get("stamp_user_id") ||
      hashParams.get("stamp_user_id") ||
      "";

    let isScanning = true;
    let validSpotIds = new Set();

    function setMessage(text, className = "") {
      msg.innerText = text;
      msg.className = className;
    }

    function setDebug() {
      debug.innerText =
`href:
${window.location.href}

search:
${window.location.search}

hash:
${window.location.hash}

query stamp_user_id:
${queryParams.get("stamp_user_id")}

hash stamp_user_id:
${hashParams.get("stamp_user_id")}

resolved stamp_user_id:
${stampUserId}`;
    }

    function resetScanner(delay = 3000) {
      setTimeout(() => {
        isScanning = true;
        setMessage("QRをスキャンしてください");
        requestAnimationFrame(tick);
      }, delay);
    }

    async function fetchTextSafe(res) {
      const text = await res.text();
      return text || `${res.status} ${res.statusText}`;
    }

    async function loadValidSpots() {
      const res = await fetch(SPOTS_API_URL);

      if (!res.ok) {
        throw new Error("スポット一覧取得失敗: " + await fetchTextSafe(res));
      }

      const json = await res.json();

      if (!json.ok) {
        throw new Error(json.error || "スポット一覧取得エラー");
      }

      if (!Array.isArray(json.spots)) {
        throw new Error("スポット一覧の形式が不正です");
      }

      validSpotIds = new Set(
        json.spots
          .map(v => String(v || "").trim())
          .filter(Boolean)
      );
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          setMessage("QRをスキャンしてください");
          requestAnimationFrame(tick);
        };
      } catch (err) {
        setMessage("カメラエラー: " + err.message, "status-error");
      }
    }

    function tick() {
      if (!isScanning) return;

      if (video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code && code.data) {
          isScanning = false;
          handleScan(code.data.trim());
          return;
        }
      }

      requestAnimationFrame(tick);
    }

    async function handleScan(scannedValue) {
      setMessage("照合中...", "status-info");

      if (!stampUserId) {
        setMessage("stamp_user_id が渡されていません", "status-error");
        resetScanner();
        return;
      }

      const spotId = scannedValue;

      try {
        if (!validSpotIds.has(spotId)) {
          setMessage("正しくないQRコードです", "status-error");
          resetScanner();
          return;
        }

        setMessage(`読み取りOK: ${spotId}`, "status-success");
        resetScanner(1500);

      } catch (e) {
        setMessage("通信エラー: " + e.message, "status-error");
        resetScanner();
      }
    }

    (async function init() {
      try {
        setDebug();

        if (!stampUserId) {
          setMessage("stamp_user_id が渡されていません", "status-error");
          return;
        }

        setMessage("準備中...", "status-info");
        await loadValidSpots();
        await startCamera();
      } catch (e) {
        setMessage("初期化エラー: " + e.message, "status-error");
      }
    })();
  </script>
</body>
</html>
