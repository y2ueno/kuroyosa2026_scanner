<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カメラデバッグ版</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f2f5; text-align: center; }
        .ver-header { background: #333; color: white; padding: 5px; font-size: 10px; }
        #reader { width: 95%; max-width: 500px; margin: 10px auto; background: white; border: 1px solid #ccc; min-height: 250px; }
        #result { margin: 15px; font-weight: bold; padding: 12px; border-radius: 4px; }
        .success { color: #155724; background: #d4edda; }
        .error { color: #721c24; background: #f8d7da; }
        #cam-error { color: red; font-size: 12px; margin: 10px; }
    </style>
</head>
<body>
    <div class="ver-header">Ver: 23:05 (Camera Debug Mode)</div>
    <div id="cam-error"></div> <div id="reader"></div>
    <div id="result"></div>

    <script>
        const WEBHOOK_URL = 'https://hook.us2.make.com/m0vinx83pe2fmwwnt4g3r83fiak6r117';
        const params = new URLSearchParams(window.location.search);
        const STAMP_USER_ID = params.get('stamp_user_id') || 'No ID';
        const EMAIL = params.get('email') || 'No Email';

        function onScanSuccess(decodedText) {
            // スキャン成功時の処理（ここは変更なし）
            const resultDisplay = document.getElementById('result');
            resultDisplay.innerText = "通信中...";
            const finalUrl = `${WEBHOOK_URL}?spotId=${encodeURIComponent(decodedText)}&stamp_user_id=${encodeURIComponent(STAMP_USER_ID)}&email=${encodeURIComponent(EMAIL)}`;
            
            fetch(finalUrl).then(res => {
                if (res.ok) {
                    document.getElementById('result').innerText = "【成功】記録しました";
                    document.getElementById('result').className = "success";
                }
            }).catch(e => {
                document.getElementById('result').innerText = "通信失敗";
                document.getElementById('result').className = "error";
            });
        }

        // カメラ起動処理を関数化
        function startScanner() {
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            const html5QrcodeScanner = new Html5QrcodeScanner("reader", config, false);
            
            html5QrcodeScanner.render(onScanSuccess, (errorMessage) => {
                // スキャン中の細かいエラーは無視（QRが見つからない等）
            });
        }

        // ページ読み込み完了後にカメラを起動
        window.onload = () => {
            if (typeof Html5QrcodeScanner === "undefined") {
                document.getElementById('cam-error').innerText = "エラー: ライブラリが読み込めていません。";
            } else {
                // 1秒待ってから起動（Web Embedの安定待ち）
                setTimeout(startScanner, 1000);
            }
        };
    </script>
</body>
</html>
