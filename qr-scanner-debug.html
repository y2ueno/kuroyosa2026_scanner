<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBUG: 組織版疎通テスト</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
  .box { background: #16213e; padding: 20px; border-radius: 8px; border: 1px solid #4ecca3; margin-bottom: 20px; }
  #log { text-align: left; background: #000; padding: 10px; font-size: 11px; height: 150px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
  button { background: #4ecca3; border: none; padding: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
</style>
</head>
<body>
  <h1>🔧 最終疎通テスト</h1>
  <div class="box" id="status">待機中...</div>
  <div style="font-size: 12px; text-align: left; margin-bottom: 5px;">通信ログ:</div>
  <div id="log"></div>
  <button onclick="test()">⚡ 組織GASへテスト送信</button>

<script>
async function test() {
  const statusEl = document.getElementById("status");
  const logEl = document.getElementById("log");
  const addLog = (m) => { logEl.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; };

  statusEl.textContent = "中継サーバー通信中...";
  addLog("Proxy送信開始: /api/stamp");

  try {
    const res = await fetch(`/api/stamp?uid=TEST_USER_OK&sid=TEST_SPOT`);
    const data = await res.json();
    statusEl.textContent = "応答: " + data.result;
    addLog("GAS応答: " + data.result);
  } catch (e) {
    statusEl.textContent = "通信エラー";
    addLog("エラー: " + e.message);
  }
}
</script>
</body>
</html>
