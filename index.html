<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフスキャナー（復旧版）</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 10px; background: #eee; }
        /* 余計な装飾を削ぎ落とし、カメラが見えることを最優先 */
        #reader { width: 100%; max-width: 500px; margin: 10px auto; background: white; }
        .info { padding: 10px; background: white; margin-bottom: 10px; font-size: 0.9em; }
        #result { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info">
        <div id="staff-display">スタッフ確認中...</div>
    </div>

    <div id="reader"></div>
    <div id="result">QRコードをスキャンしてください</div>

    <script>
        const WEBHOOK_URL = 'https://hook.us1.make.com/xxxxxxxxxxxxxxxxxxxxxxxx';

        // 1. パラメータ取得（ここは今完成した「staff」と「email」を使う）
        const params = new URLSearchParams(window.location.search);
        const STAFF_ID = params.get('staff') || '';
        const STAFF_EMAIL = params.get('email') || '';

        const infoDisplay = document.getElementById('staff-display');
        if (STAFF_EMAIL && STAFF_ID) {
            infoDisplay.innerText = `スタッフ: ${STAFF_EMAIL} (${STAFF_ID})`;
        } else {
            infoDisplay.innerHTML = `<span style="color:red;">認証情報なし</span>`;
        }

        // 2. 24時間前の「一番シンプルだった起動方法」に戻す
        const html5QrCode = new html5Qrcode("reader");
        
        // ページ読み込みと同時に開始
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                // スキャン成功時
                html5QrCode.stop();
                document.getElementById('result').innerText = "送信中...";

                const finalUrl = `${WEBHOOK_URL}?scannedUserId=${encodeURIComponent(decodedText)}&staffId=${encodeURIComponent(STAFF_ID)}&staffEmail=${encodeURIComponent(STAFF_EMAIL)}`;

                fetch(finalUrl).then(response => {
                    if (response.ok) {
                        document.getElementById('result').innerText = "成功：保存されました";
                        setTimeout(() => location.reload(), 2000); // 成功したらリロードして再待機
                    }
                });
            }
        ).catch(err => {
            document.getElementById('result').innerText = "カメラ起動エラー: " + err;
        });
    </script>
</body>
</html>
