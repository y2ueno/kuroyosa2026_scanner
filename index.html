<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事務局専用｜景品交換スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { text-align: center; font-family: sans-serif; background: #f0f2f5; padding: 20px; }
    #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; overflow: hidden; border-radius: 20px; background: #000; border: 4px solid #fff; }
    #canvas { width: 100%; height: 100%; object-fit: cover; }
    #msg { margin-top: 20px; padding: 20px; border-radius: 14px; font-weight: bold; background: #fff; min-height: 100px; display: flex; align-items: center; justify-content: center; }
    .status-success { background: #e6f4ea !important; color: #1e8e3e; border: 2px solid #34a853; }
    .status-error { background: #fce8e6 !important; color: #d93025; border: 2px solid #ea4335; }
    #retry-btn { display: none; margin: 20px auto; padding: 12px 30px; border-radius: 999px; background: #1a73e8; color: #fff; border: none; font-weight: bold; }
  </style>
</head>
<body>
  <h1>景品交換スキャナー</h1>
  <div id="staff-badge" style="margin: 10px 0;">読み込み中...</div>
  <div id="wrapper">
    <video id="video" style="display:none" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="msg">カメラ起動中...</div>
  <button id="retry-btn" onclick="resetScanner()">次の人をスキャン</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    const retryBtn = document.getElementById('retry-btn');
    const staffBadge = document.getElementById('staff-badge');

    // --- ここにMakeのWebhook URLを貼る ---
    const WEBHOOK_URL = 'https://hook.us2.make.com/2latx26ux6bo7bhfvfv3cmxs5i2p7xbh';
    const STAFF_ID = new URLSearchParams(window.location.search).get('staff') || 'unknown';
    staffBadge.textContent = 'スタッフID: ' + STAFF_ID;

    let isScanning = true;

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          video.play();
          msg.innerText = 'QRコードをスキャンしてください';
          requestAnimationFrame(tick);
        });
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          isScanning = false;
          sendData(code.data);
        }
      }
      if (isScanning) requestAnimationFrame(tick);
    }

    function sendData(userId) {
      msg.innerText = '判定中...';
      // GET方式でデータを送る（CORS回避の秘策）
      const finalUrl = `${WEBHOOK_URL}?userId=${encodeURIComponent(userId)}&staffId=${encodeURIComponent(STAFF_ID)}`;

      fetch(finalUrl)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            msg.innerHTML = '✅ 交換OK！<br>景品を渡してください';
            msg.className = 'status-success';
          } else {
            msg.innerText = '❌ エラー: ' + (data.message || '不明');
            msg.className = 'status-error';
          }
          retryBtn.style.display = 'block';
        })
        .catch(err => {
          msg.innerHTML = '❌ 通信失敗<br>MakeのWebhookResponseを確認してください';
          msg.className = 'status-error';
          retryBtn.style.display = 'block';
        });
    }

    function resetScanner() {
      isScanning = true;
      retryBtn.style.display = 'none';
      msg.innerText = 'QRコードをスキャンしてください';
      msg.className = '';
      requestAnimationFrame(tick);
    }

    startCamera();
  </script>
</body>
</html>
