<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事務局専用｜景品交換スキャナー</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { 
            text-align: center; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #1a73e8; }
        
        #wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 360px; 
            margin: 0 auto; 
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        #canvas { width: 100%; height: 100%; object-fit: cover; }

        #msg { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            line-height: 1.5;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 状態別スタイル */
        .status-wait { color: #5f6368; }
        .status-error { color: #d93025; background: #fce8e6 !important; }
        .status-sending { color: #e67e22; animation: blink 1s infinite; }
        .status-success { color: #188038; background: #e6f4ea !important; border: 2px solid #34a853; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .hint { font-size: 12px; color: #777; margin-top: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <h1>景品交換スキャナー</h1>

    <div id="wrapper">
        <video id="video" style="display:none"></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="msg" class="status-wait">
        カメラの起動を準備中...
    </div>

    <p class="hint">※カメラの利用許可を求めるポップアップが出たら<br>「許可」をタップしてください</p>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("msg");

        // 【確定済み】あなたのGASウェブアプリURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwPTNdb1Y94X1L1-AM6bykD0gnNbHvoxqycEAs8XTSQPujLsl6ZRvUla0042zeUyG-5/exec";

        let isScanning = true;

        // カメラ起動処理
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // iOS Safari対策
                video.play();
                msg.innerText = "QRコードを枠内に収めてください";
                msg.className = "status-wait";
                requestAnimationFrame(tick);
            })
            .catch(err => {
                console.error(err);
                msg.innerHTML = "【エラー】カメラを起動できません<br>ブラウザの設定でカメラ権限を許可してください";
                msg.className = "status-error";
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    isScanning = false; // 二重送信防止
                    sendData(code.data);
                }
            }
            if (isScanning) {
                requestAnimationFrame(tick);
            }
        }

        function sendData(userId) {
            msg.innerText = "判定中...";
            msg.className = "status-sending";

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ userId: userId })
            })
            .then(() => {
                // 送信成功時の表示
                msg.innerHTML = "送信完了！<br>下の「完了」ボタンを押して戻ってください";
                msg.className = "status-success";
                
                // 完了バイブレーション（Androidのみ）
                if (navigator.vibrate) navigator.vibrate(200);
            })
            .catch(err => {
                alert("送信エラーが発生しました: " + err);
                isScanning = true;
                msg.innerText = "エラー：再スキャンしてください";
            });
        }

        // 実行開始
        startCamera();
    </script>
</body>
</html>
