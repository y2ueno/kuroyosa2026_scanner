<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よさこい2026 スタッフ専用スキャナー</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #e9ecef; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #info { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; width: 100%; max-width: 500px; text-align: center; }
        .staff-info { color: #d32f2f; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        #result { margin-top: 10px; font-weight: bold; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>【スタッフ用】検印スキャナー</h2>

    <div id="info">
        <div id="staff-display" class="staff-info">スタッフ確認中...</div>
        <div id="result">ユーザーのQRをスキャンしてください</div>
    </div>

    <div id="reader"></div>

    <script>
        // --- 設定 ---
        const WEBHOOK_URL = 'https://hook.us1.make.com/xxxxxxxxxxxxxxxxxxxxxxxx'; // ★スタッフ用WebhookのURL

        // 1. URLからスタッフ自身のIDとメールを取得
        const params = new URLSearchParams(window.location.search);
        const STAFF_ID = params.get('staff_id') || ''; 
        const STAFF_EMAIL = params.get('email') || '';

        // 画面表示
        const infoDisplay = document.getElementById('staff-display');
        if (STAFF_EMAIL && STAFF_ID) {
            infoDisplay.innerText = `実行スタッフ: ${STAFF_EMAIL} (${STAFF_ID})`;
        } else {
            infoDisplay.innerHTML = `<span style="color:red;">スタッフ認証情報がありません</span>`;
        }

        const html5QrCode = new html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        const onScanSuccess = (decodedText) => {
            html5QrCode.stop();
            const resultDisplay = document.getElementById('result');
            resultDisplay.innerText = "データ送信中...";

            // 2. Makeへ飛ばす（スタッフID、スキャンした相手のID、スタッフメール）
            const finalUrl = `${WEBHOOK_URL}?scannedUserId=${encodeURIComponent(decodedText)}&staffId=${encodeURIComponent(STAFF_ID)}&staffEmail=${encodeURIComponent(STAFF_EMAIL)}`;

            fetch(finalUrl)
                .then(response => {
                    if (response.ok) {
                        resultDisplay.innerText = "スキャン完了！";
                        resultDisplay.className = "success";
                    } else {
                        resultDisplay.innerText = "エラー：保存に失敗しました";
                        resultDisplay.className = "error";
                    }
                })
                .catch(err => {
                    resultDisplay.innerText = "通信エラー";
                    resultDisplay.className = "error";
                })
                .finally(() => {
                    setTimeout(() => {
                        resultDisplay.innerText = "次のQRをスキャンしてください";
                        resultDisplay.className = "";
                        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                    }, 3000);
                });
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
