<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事務局専用｜景品交換スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { text-align: center; font-family: sans-serif; background: #f0f2f5; padding: 20px; }
    #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; overflow: hidden; border-radius: 20px; background: #000; border: 4px solid #fff; }
    #canvas { width: 100%; height: 100%; object-fit: cover; }
    #msg { margin-top: 20px; padding: 20px; border-radius: 14px; font-weight: bold; background: #fff; min-height: 100px; display: flex; align-items: center; justify-content: center; }
    .status-success { background: #e6f4ea !important; color: #1e8e3e; border: 2px solid #34a853; }
    .status-error { background: #fce8e6 !important; color: #d93025; border: 2px solid #ea4335; }
    #retry-btn { display: none; margin: 20px auto; padding: 12px 30px; border-radius: 999px; background: #1a73e8; color: #fff; border: none; font-weight: bold; }
  </style>
</head>
<body>
  <h1>スタンプ読み取り</h1>
  <div id="staff-badge" style="margin: 10px 0; font-size: 0.8em; color: #666;"></div>
  <div id="wrapper">
    <video id="video" style="display:none" playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="msg">カメラ起動中...</div>
  <button id="retry-btn" onclick="resetScanner()">もう一度スキャン</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    const retryBtn = document.getElementById('retry-btn');
    const staffBadge = document.getElementById('staff-badge');

    // --- 設定済み：MakeのWebhook URL ---
    const WEBHOOK_URL = 'https://hook.us2.make.com/2latx26ux6bo7bhfvfv3cmxs5i2p7xbh';
    
    // --- 設定済み：戻り先のアプリ画面URL ---
    const APP_URL = 'https://96omotesando.glide.page/dl/2f7958';

    const STAFF_ID = new URLSearchParams(window.location.search).get('staff') || 'user_scan';
    if(STAFF_ID !== 'user_scan') staffBadge.textContent = 'スタッフID: ' + STAFF_ID;

    let isScanning = true;

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          video.play();
          msg.innerText = 'QRコードをスキャンしてください';
          requestAnimationFrame(tick);
        })
        .catch(err => {
          msg.innerText = 'カメラの起動に失敗しました。設定を確認してください。';
        });
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
        canvas.height = video.videoHeight;
        canvas.width = video.videoWidth;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          isScanning = false;
          sendData(code.data);
        }
      }
      if (isScanning) requestAnimationFrame(tick);
    }

    function sendData(userId) {
      msg.innerText = 'スタンプを記録中...';
      const finalUrl = `${WEBHOOK_URL}?userId=${encodeURIComponent(userId)}&staffId=${encodeURIComponent(STAFF_ID)}`;

      fetch(finalUrl)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            msg.innerHTML = '✅ 読み込み成功！<br>画面を戻します...';
            msg.className = 'status-success';
            
            // 2秒後に元のスタンプ台紙へ強制リダイレクト
            setTimeout(() => {
              window.parent.location.href = APP_URL;
            }, 2000);

          } else {
            msg.innerText = '❌ エラー: ' + (data.message || '不明なエラー');
            msg.className = 'status-error';
            retryBtn.style.display = 'block';
          }
        })
        .catch(err => {
          msg.innerHTML = '❌ 通信失敗<br>通信環境の良い場所で試してください';
          msg.className = 'status-error';
          retryBtn.style.display = 'block';
        });
    }

    function resetScanner() {
      isScanning = true;
      retryBtn.style.display = 'none';
      msg.innerText = 'QRコードをスキャンしてください';
      msg.className = '';
      requestAnimationFrame(tick);
    }

    startCamera();
  </script>
</body>
</html>
